# Knowledge Processing Pipeline configuration (SA-131).
# Declares which stages run and their parameters. Toggle a stage's `enabled` to
# turn it off (e.g. "fast ingest" = disable the expensive LLM stages once they
# exist). Stage order is the order below.

stages:
  extract:            # format -> structured blocks (headings/paragraphs/lists)
    enabled: true
  clean:              # strip repeated headers/footers, page numbers, whitespace
    enabled: true
  section:            # group blocks into sections under their heading path
    enabled: true
  chunk:              # adaptive + multi-level sliding-window chunking
    enabled: true
    adaptive: true    # pick base size from detected document type
    overlap: 0.2      # sliding-window overlap fraction (0.15–0.25)
    levels:           # multi-level representations (word targets)
      large: 350
      medium: 180
      small: 80
  enrich:             # final chunk records: metadata, quality score, keywords
    enabled: true
